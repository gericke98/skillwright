name: Release

# Tag-driven and manual only — never on push. Cutting a `v*` tag against the
# real remote is the single, deliberate action that publishes.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release + upload the extension zip
  id-token: write # npm provenance (--provenance) needs OIDC

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Gate the publish on a green build first.
      - run: pnpm typecheck
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test

      # Publish the CLI to npm with provenance. `prepack` builds the bundle.
      - name: Publish bskill to npm
        run: pnpm --filter bskill publish --provenance --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Build + zip the unpacked extension for the GitHub Release.
      - name: Build extension
        run: pnpm --filter @bskill/extension build:crx

      - name: Zip extension
        run: |
          cd packages/extension/dist-extension
          zip -r "$GITHUB_WORKSPACE/bskill-extension.zip" .

      - name: Attach extension to the Release
        uses: softprops/action-gh-release@v2
        with:
          files: bskill-extension.zip
          body: |
            bskill ${{ github.ref_name }}

            - CLI: `npm i -g bskill` (published to npm with provenance).
            - Extension: download `bskill-extension.zip`, unzip, and load unpacked
              via chrome://extensions (Developer mode). See the README for the
              known unpacked-extension limitation on managed profiles.
