<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>skillwright</title>
    <style>
      body { font: 14px/1.5 system-ui, sans-serif; margin: 0; padding: 16px; }
      h1 { font-size: 16px; margin: 0 0 12px; }
      label { display: block; margin-bottom: 8px; }
      input { width: 100%; box-sizing: border-box; padding: 6px; }
      button { width: 100%; padding: 10px; font-size: 14px; cursor: pointer; margin-top: 8px; }
      button.recording { background: #c0392b; color: #fff; }
      .count { margin-top: 12px; color: #555; }
      .dot { color: #c0392b; }
      .stages { display: flex; gap: 6px; flex-wrap: wrap; }
      .stage { padding: 2px 8px; border: 1px solid #ccc; border-radius: 10px; font-size: 12px; color: #555; }
      .stage-current { border-color: #c0392b; color: #c0392b; font-weight: bold; }
      .stage-error { color: #c0392b; margin-top: 6px; font-size: 12px; }
      .param-row { display: flex; gap: 8px; align-items: baseline; padding: 6px 0; border-bottom: 1px solid #eee; flex-wrap: wrap; }
      .param-secret { background: #fff6f6; }
    </style>
  </head>
  <body>
    <h1>skillwright recorder</h1>
    <label>
      Task name
      <input id="task-name" type="text" placeholder="e.g. Delete invoice" />
    </label>
    <button id="toggle">Start recording</button>
    <p class="count"><span id="count">0</span> steps captured <span id="live"></span></p>

    <hr />
    <h1>Replay relay</h1>
    <p style="color:#555;margin-top:0">Run <code>skillwright run &lt;skill&gt; --relay</code>, then paste its port + token here and Connect.</p>
    <label>Port <input id="relay-port" type="number" value="9333" /></label>
    <label>Token <input id="relay-token" type="text" placeholder="from the skillwright run output" /></label>
    <button id="relay-connect">Connect to relay</button>
    <p class="count">Relay: <span id="relay-status">not connected</span></p>

    <hr />
    <h1>Pipeline</h1>
    <div id="stages" class="stages"></div>
    <div id="stage-parameterize"></div>

    <script type="module" src="./panel.ts"></script>
  </body>
</html>
